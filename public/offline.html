<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>NutriMama — offline</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Inter", -apple-system, system-ui, sans-serif;
        background: #FAF7F2;
        color: #1A1F1D;
      }
      main {
        text-align: center;
        padding: 2.5rem;
        max-width: 22rem;
        background: #fff;
        border-radius: 24px;
        box-shadow: 0 18px 40px -12px rgba(31,77,63,.18);
      }
      .badge {
        display: inline-block;
        padding: .35rem .8rem;
        border-radius: 999px;
        background: #F4C5BB;
        color: #1F4D3F;
        font-size: .75rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }
      h1 { font-size: 1.5rem; margin: 0 0 .5rem; color: #1F4D3F; letter-spacing: -.02em; }
      p  { line-height: 1.55; opacity: .75; margin: 0; }
    </style>
  </head>
  <body>
    <main>
      <span class="badge">Offline</span>
      <h1>We'll be right back.</h1>
      <p>NutriMama needs a connection to keep your health data secure and current. Reconnect and refresh — everything you've logged is safe.</p>
    </main>
  </body>
</html>
